name: EUR/HUF Alert

on:
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  send-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch rate and notify
        run: |
          RATE=$(curl -s "https://query1.finance.yahoo.com/v8/finance/chart/EURHUF=X" \
            -H "User-Agent: Mozilla/5.0" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"{d['chart']['result'][0]['meta']['regularMarketPrice']:.2f}\")")
          HOUR=$(TZ='Europe/Budapest' date +%H:%M)
          curl -s \
            -H "Title: EUR/HUF · $HOUR" \
            -H "Priority: default" \
            -H "Tags: euro" \
            -d "1 EUR = $RATE HUF" \
            https://ntfy.sh/eurhuf
