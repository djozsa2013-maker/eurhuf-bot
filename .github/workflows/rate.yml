name: EUR/HUF Alert

on:
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  send-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch rate and notify
        run: |
          RATE=$(python3 - <<'EOF'
import urllib.request, xml.etree.ElementTree as ET
url = "https://www.mnb.hu/arfolyamok.asmx/GetCurrentExchangeRates"
with urllib.request.urlopen(url) as r:
    root = ET.fromstring(r.read())
for day in root.iter('Day'):
    for item in day.iter('Rate'):
        if item.get('curr') == 'EUR':
            print(f"{float(item.text.replace(',', '.')):.2f}")
            exit()
EOF
)
          HOUR=$(TZ='Europe/Budapest' date +%H:%M)
          curl -s \
            -H "Title: EUR/HUF · $HOUR" \
            -H "Priority: default" \
            -H "Tags: euro" \
            -d "1 EUR = $RATE HUF" \
            https://ntfy.sh/eurhuf
