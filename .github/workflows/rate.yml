name: EUR/HUF Alert

on:
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  send-rate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch rate and notify
        run: |
          RATE=$(curl -s "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/eur.json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f\"{d['eur']['huf']:.2f}\")")
          HOUR=$(TZ='Europe/Budapest' date +%H:%M)
          curl -s \
            -H "Title: EUR/HUF · $HOUR" \
            -H "Priority: default" \
            -H "Tags: euro" \
            -d "1 EUR = $RATE HUF" \
            https://ntfy.sh/eurhuf
